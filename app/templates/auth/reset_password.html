{% extends "base.html" %}

{% block title %}Reset Password - AgriSearch{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="card p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                    <img src="{{ url_for('static', filename='agrisearch_logo.png') }}" alt="AgriSearch Logo" class="w-10 h-10 object-contain">
                </div>
                <h1 class="text-3xl font-bold text-gray-900">Create New Password</h1>
                <p class="text-gray-600 mt-2">Enter your new password below</p>
            </div>
            
            <!-- Form -->
            <form method="POST" class="space-y-4">
                <!-- New Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2"></i>New Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input"
                        placeholder="••••••••"
                        minlength="8"
                        required
                        autofocus
                    >
                    <p class="text-xs text-gray-500 mt-1">At least 8 characters</p>
                </div>
                
                <!-- Confirm Password -->
                <div>
                    <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2"></i>Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="password_confirm" 
                        name="password_confirm" 
                        class="form-input"
                        placeholder="••••••••"
                        required
                    >
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary w-full mt-6">
                    <i class="fas fa-check-circle mr-2"></i>Reset Password
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">or</span>
                </div>
            </div>
            
            <!-- Link -->
            <div class="text-center text-sm text-gray-600">
                <p>
                    Remember your password? 
                    <a href="{{ url_for('auth.login') }}" class="text-green-600 font-semibold hover:text-green-700">
                        Sign in
                    </a>
                </p>
            </div>
        </div>
        
        <!-- Footer Note -->
        <div class="text-center mt-8 text-sm text-gray-600">
            <p>🌾 Empowering farmers in Victoria, Laguna</p>
        </div>
    </div>
</div>
{% endblock %}
